<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - UP Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .bg-page { background-color: #F5E6F6; }
        .text-u-purple { color: #6C2B97; }
        .bg-u-purple { background-color: #6C2B97; }
        .input-bg { background-color: #F3F4F6; }
    </style>
</head>
<body class="bg-page min-h-screen flex flex-col pt-24">

    <nav class="w-full px-8 py-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center p-1.5 overflow-hidden border border-gray-100">
                 <img src="pic/Logo_of_University_of_Phayao.svg" alt="UP Logo" class="w-full h-full object-contain">
            </div>
            <div class="flex flex-col">
                <span class="font-bold text-gray-900 text-lg lg:text-xl leading-none uppercase">UP Badminton</span>
                <span class="text-[12px] text-gray-500 font-bold tracking-wide uppercase mt-1">UNIVERSITY OF PHAYAO</span>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <a href="index.html" class="text-gray-900 font-bold text-lg hover:text-u-purple transition">เข้าสู่ระบบ</a>
            <a href="Register.html" class="text-gray-900 font-bold text-lg hover:text-u-purple transition">ลงทะเบียน</a>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center px-4">
        
        <div class="bg-white p-10 md:p-14 rounded-[40px] shadow-xl w-full max-w-[500px] text-center border border-purple-50">
            
            <div class="flex justify-center mb-6">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-md p-2 border border-gray-50">
                    <img src="pic/Logo_of_University_of_Phayao.svg" alt="UP Logo" class="w-full h-full object-contain">
                </div>
            </div>

            <h2 class="text-3xl font-bold text-gray-900 mb-3">ลืมรหัสผ่าน</h2>
            <p class="text-gray-500 text-base mb-10 leading-relaxed">ระบุอีเมลที่ใช้ลงทะเบียน<br>เพื่อรับลิงก์ในการเปลี่ยนรหัสผ่านใหม่</p>

            <form action="#" class="space-y-8 text-left">
                
                <div>
                    <label class="block text-gray-900 font-bold text-base mb-2.5 ml-1">Email</label>
                    <input type="email" 
                        class="w-full px-6 py-4 input-bg border-none rounded-2xl text-lg text-gray-700 focus:ring-2 focus:ring-purple-300 focus:outline-none placeholder-gray-400 transition" 
                        placeholder="ระบุอีเมลของคุณ">
                </div>

                <button type="submit" class="w-full bg-u-purple hover:bg-purple-800 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-purple-200 text-xl active:scale-95">
                    ส่งลิงก์ตั้งรหัสผ่านใหม่
                </button>

            </form>

            <div class="mt-8">
                <a href="index.html" class="text-u-purple font-bold hover:underline text-base flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    กลับสู่หน้าเข้าสู่ระบบ
                </a>
            </div>

        </div>

    </div>

</body>
</html>
