<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การแจ้งเตือน - UP Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .bg-page { background-color: #F5E6F6; }
        .text-u-purple { color: #6C2B97; }
        .bg-u-purple { background-color: #6C2B97; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-page min-h-screen flex flex-col pt-24 pb-12">

    <nav class="w-full px-8 py-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center p-1.5 overflow-hidden border border-gray-100">
                 <img src="pic/Logo_of_University_of_Phayao.svg" alt="UP Logo" class="w-full h-full object-contain">
            </div>
            <div class="flex flex-col">
                <span class="font-bold text-gray-900 text-base lg:text-lg leading-none">UP Badminton</span>
                <span class="text-[10px] text-gray-500 font-medium tracking-wide">UNIVERSITY OF PHAYAO</span>
            </div>
        </div>

        <div class="flex items-center gap-4 lg:gap-8">
            <div class="hidden md:flex items-center gap-2">
                <a href="Main menu.html" class="text-gray-900 px-5 py-2 rounded-lg font-bold hover:bg-gray-50 transition">หน้าหลัก</a>
                <a href="history.html" class="text-gray-900 px-5 py-2 rounded-lg font-bold hover:bg-gray-50 transition">จองคิวสนาม</a>
            </div>

            <div class="flex items-center gap-4 border-l border-gray-200 pl-4 lg:pl-8">
                <a href="notifications.html" class="relative p-2 bg-u-purple text-white rounded-xl shadow-md transition flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                    </svg>
                </a>
                
                <a href="profile.html" class="w-10 h-10 bg-gray-200 rounded-full overflow-hidden border border-gray-300 hover:ring-2 hover:ring-purple-200 transition flex items-center justify-center">
                     <svg class="w-full h-full text-gray-500 p-1" fill="currentColor" viewBox="0 0 24 24"><path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-[1000px] mx-auto px-6 lg:px-10 mt-6 flex-grow">
        
        <div class="mb-6">
            <h1 class="text-4xl font-bold text-black mb-2">การแจ้งเตือน</h1>
            <p class="text-gray-500 text-sm">ติดตามสถานะการจองสนามอาคารสงวนเสริมศรีและข่าวสารล่าสุดของมหาวิทยาลัย</p>
        </div>

        <div class="mb-8">
            <button class="bg-u-purple text-white px-8 py-2 rounded-2xl text-sm font-medium shadow-md hover:bg-purple-800 transition">ทั้งหมด</button>
        </div>

        <div class="space-y-6" id="notification-container">
            </div>

    </main>

    <script>
        function loadNotifications() {
            const container = document.getElementById('notification-container');
            container.innerHTML = ''; // ล้างค่าเดิม
            let hasContent = false;

            // 1. ตรวจสอบสถานะการจองคิวของผู้ใช้งาน
            const user = JSON.parse(localStorage.getItem('up_badminton_user'));
            const queues = JSON.parse(localStorage.getItem('up_badminton_queues')) || [];
            
            if (user && user.name) {
                const userName = user.name.toLowerCase();
                let userQueue = null;
                let queueIndex = -1;

                // หาคิวที่ผู้ใช้ลงชื่อไว้
                for (let i = 0; i < queues.length; i++) {
                    if (queues[i].players.some(p => p && p.toLowerCase() === userName)) {
                        userQueue = queues[i];
                        queueIndex = i;
                        break;
                    }
                }

                if (userQueue) {
                    hasContent = true;
                    let title, desc, iconBg, iconSvg;

                    // ถ้าอยู่ใน 4 คิวแรก = ได้เล่นแล้ว
                    if (queueIndex < 4) {
                        title = "ถึงคิวของคุณแล้ว";
                        desc = `เชิญเข้าใช้บริการสนามได้เลย (คุณอยู่คิวที่ ${userQueue.id})`;
                        iconBg = "bg-[#58E36D]"; // สีเขียว
                        iconSvg = `<path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />`;
                    } else {
                        // ถ้าคิวมากกว่า 4 = รอสนาม
                        title = "จองคิวสำเร็จ";
                        desc = `คุณอยู่ในคิวที่ ${userQueue.id} โปรดรอจนกว่าจะถึงคิวของคุณ`;
                        iconBg = "bg-blue-400"; // สีฟ้า
                        iconSvg = `<path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />`;
                    }

                    container.innerHTML += `
                        <div class="bg-white rounded-[24px] p-6 shadow-sm flex items-center gap-6 border border-white/50 animate-fade-in">
                            <div class="w-20 h-20 rounded-full ${iconBg} flex items-center justify-center flex-shrink-0 shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="4" stroke="white" class="w-10 h-10">
                                    ${iconSvg}
                                </svg>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-2xl text-black">${title}</h3>
                                <p class="text-base text-gray-500">${desc}</p>
                                <p class="text-sm text-u-purple mt-1 font-medium">อัปเดตล่าสุด</p>
                            </div>
                        </div>
                    `;
                }
            }

            // 2. โหลดประกาศปิดสนามจากแอดมิน
            const adminLogs = JSON.parse(localStorage.getItem('admin_logs')) || [];
            if (adminLogs.length > 0) {
                hasContent = true;
                // reverse เพื่อให้อันล่าสุดอยู่บน
                adminLogs.reverse().forEach((log, index) => {
                    const timeText = index === 0 ? "เมื่อสักครู่" : "ก่อนหน้านี้";
                    container.innerHTML += `
                        <div class="bg-white rounded-[24px] p-6 shadow-sm flex items-center gap-6 border border-white/50 animate-fade-in" style="animation-delay: 0.1s;">
                            <div class="w-20 h-20 flex items-center justify-center flex-shrink-0">
                                <img src="https://cdn-icons-png.flaticon.com/512/1997/1997888.png" alt="announcement" class="w-16 h-16 object-contain">
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-2xl text-black">ประกาศปิดปรับปรุงสนาม</h3>
                                <p class="text-base text-gray-500 leading-snug">สนามแบดมินตัน อาคารสงวนเสริมศรี จะปิดปรับปรุงชั่วคราว <span class="font-bold text-gray-700">${log.court}</span> ในวันที่ <span class="font-bold text-gray-700">${log.date}</span> เนื่องจาก ${log.reason} ขออภัยในความไม่สะดวก</p>
                                <p class="text-sm text-u-purple mt-1 font-medium">${timeText}</p>
                            </div>
                        </div>
                    `;
                });
            }

            // ถ้าไม่มีการแจ้งเตือนอะไรเลย
            if (!hasContent) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-gray-400 text-lg">ยังไม่มีการแจ้งเตือนในขณะนี้</p>
                    </div>`;
            }
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = loadNotifications;
    </script>
</body>
</html>
