<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ผู้ดูแลระบบ - UP Badminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        'bg-page': '#F5E6F6',
                        'u-purple': '#6C2B97',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        .info-box { @apply w-full bg-gray-100 text-gray-700 px-6 py-4 rounded-xl border border-transparent text-lg font-medium; }
        .editable-input { @apply w-full bg-white text-gray-900 px-6 py-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition text-lg font-bold; }
    </style>
</head>
<body class="bg-bg-page min-h-screen flex flex-col pt-24 pb-12 text-gray-900">

    <nav class="w-full px-8 py-4 flex justify-between items-center fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center p-1.5 overflow-hidden border border-gray-100 shadow-sm">
                <img src="pic/Logo_of_University_of_Phayao.svg" alt="UP Logo" class="w-full h-full object-contain">
            </div>
            <div class="flex flex-col">
                <span class="font-bold text-gray-900 text-lg lg:text-xl leading-none uppercase">UP Badminton</span>
                <span class="text-[12px] text-gray-500 font-bold tracking-wide uppercase mt-1">UNIVERSITY OF PHAYAO</span>
            </div>
        </div>

        <div class="flex items-center gap-4 lg:gap-8">
            <div class="hidden md:flex items-center gap-2">
                <a href="AdminMainmenu.html" class="text-gray-900 px-5 py-2 rounded-lg font-bold text-lg hover:bg-gray-50 transition">หน้าหลัก</a>
                <a href="track status.html" class="text-gray-900 px-5 py-2 rounded-lg font-bold text-lg hover:bg-gray-50 transition">ติดตามสถานะคิว</a>
                <a href="Adminstatistics.html" class="text-gray-900 px-5 py-2 rounded-lg font-bold text-lg hover:bg-gray-50 transition">สถิติการใช้บริการ</a>
            </div>

            <div class="flex items-center gap-4 border-l border-gray-200 pl-4 lg:pl-8">
                <a href="Adminnotifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-full transition flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                    </svg>
                    <span class="absolute top-2 right-2.5 w-2.5 h-2.5 bg-red-500 rounded-full border border-white"></span>
                </a>
                
                <a href="Adminprofile.html" class="w-12 h-12 bg-u-purple rounded-full overflow-hidden border-2 border-purple-200 shadow-md flex items-center justify-center transition transform scale-105">
                    <svg class="w-full h-full text-white p-1.5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-[1000px] mx-auto px-6 lg:px-10 mt-6 flex-grow">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-black mb-2">โปรไฟล์ผู้ดูแลระบบ</h1>
        </div>

        <div class="space-y-8">
            
            <div class="bg-white rounded-[20px] shadow-sm overflow-hidden relative border border-purple-50">
                <div class="h-32 bg-u-purple w-full"></div>
                <div class="px-10 pb-10 pt-16 md:pt-6 flex flex-col md:flex-row items-center md:items-end gap-8 relative">
                    <div class="absolute -top-20 left-1/2 transform -translate-x-1/2 md:static md:translate-x-0 md:-mt-20 border-4 border-white rounded-full bg-gray-200 w-40 h-40 flex items-center justify-center overflow-hidden shadow-lg">
                        <svg class="w-24 h-24 text-gray-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <div class="text-center md:text-left mt-10 md:mt-0 flex flex-col items-center md:items-start">
                        <div class="flex items-center justify-center md:justify-start gap-4">
                            <h2 id="display-name" class="text-3xl font-bold text-black">-</h2>
                            <span class="bg-[#FCE6CD] text-[#B57C2B] text-sm font-extrabold px-4 py-1.5 rounded-full flex items-center gap-2 shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                Admin
                            </span>
                        </div>
                        <div class="flex flex-col md:flex-row gap-2 md:gap-8 text-gray-600 font-bold text-lg mt-3">
                            <p>รหัสพนักงาน <span id="display-staff-id" class="text-u-purple">-</span></p>
                            <p class="hidden md:block text-gray-300">|</p>
                            <p>ตำแหน่ง <span class="text-u-purple">ผู้ดูแลระบบสนาม</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[20px] p-8 shadow-sm border border-purple-50">
                <h3 class="font-bold text-2xl text-black mb-6 border-l-4 border-u-purple pl-4">ข้อมูลส่วนตัว</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-base font-bold text-gray-500 mb-2 ml-1">ชื่อ - นามสกุล</label>
                        <div id="name-display" class="info-box cursor-not-allowed opacity-70 font-bold">-</div>
                    </div>
                    <div>
                        <label class="block text-base font-bold text-gray-500 mb-2 ml-1">รหัสพนักงาน</label>
                        <div id="input-staff-id" class="info-box cursor-not-allowed opacity-70 font-bold">-</div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[20px] p-8 shadow-sm border border-purple-50">
                <h3 class="font-bold text-2xl text-black mb-6 border-l-4 border-u-purple pl-4">ช่องทางติดต่อ</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-base font-bold text-gray-500 mb-2 ml-1">Email</label>
                        <div id="input-email" class="info-box cursor-not-allowed opacity-70 font-bold">-</div>
                    </div>
                    <div>
                        <label class="block text-base font-bold text-gray-500 mb-2 ml-1">เบอร์โทรศัพท์ <span class="text-u-purple font-normal text-sm ml-2">(สามารถแก้ไขได้)</span></label>
                        <div class="relative">
                            <input type="tel" id="phone-input" class="editable-input" placeholder="กรอกเบอร์โทรศัพท์">
                            <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-u-purple">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button onclick="saveProfile()" class="bg-purple-100 hover:bg-purple-200 text-u-purple font-bold py-3 px-10 rounded-xl transition text-lg flex items-center gap-3 active:scale-95 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                            บันทึกการแก้ไข
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button onclick="logout()" class="bg-u-purple hover:bg-purple-800 text-white font-bold py-4 px-12 rounded-2xl shadow-lg transition text-xl active:scale-95">ออกจากระบบ</button>
            </div>
        </div>
    </main>

    <script src="javascript/AdminProfile.js"></script>
</body>
</html>
